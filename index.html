<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Italian A1/A2 Practice</title>
    <meta
      name="description"
      content="A Duolingo-style Italian A1/A2 exam practice app with vocabulary, grammar, dialogues, and exam review."
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="fixes.css?v=6" />
    <link rel="stylesheet" href="learn.css?v=1" />
    <link rel="stylesheet" href="dark.css?v=2" />
    <link rel="stylesheet" href="dashboard-exam.css?v=1" />
    <link rel="stylesheet" href="exercise-exam-bank.css?v=1" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Study overview">
        <a class="brand" href="#top" aria-label="Italian A1 A2 Practice home">
          <span class="brand-mark" aria-hidden="true">IT</span>
          <span>
            <strong>Italiano</strong>
            <small>A1/A2 exam trainer</small>
          </span>
        </a>

        <div class="stat-grid" aria-label="Progress statistics">
          <div class="stat-tile">
            <span id="xpStat">0</span>
            <small>XP</small>
          </div>
          <div class="stat-tile">
            <span id="streakStat">0</span>
            <small>streak</small>
          </div>
          <div class="stat-tile">
            <span id="doneStat">0%</span>
            <small>done</small>
          </div>
        </div>

        <nav class="mode-nav" aria-label="Practice modes">
          <button class="mode-button active" id="pathMode" type="button">
            <span aria-hidden="true">◎</span>
            Path
          </button>
          <button class="mode-button" id="mistakesMode" type="button">
            <span aria-hidden="true">!</span>
            Mistakes
          </button>
          <button class="mode-button" id="examMode" type="button">
            <span aria-hidden="true">✓</span>
            Exam
          </button>
        </nav>
      </aside>

      <main id="top" class="main-stage" tabindex="-1">
        <section class="topbar" aria-label="Current focus">
          <div>
            <p class="eyebrow" id="stageEyebrow">Personal exam path</p>
            <h1 id="stageTitle">Italian A1/A2 practice</h1>
          </div>
          <button class="ghost-button" id="resetButton" type="button" title="Reset progress">
            <span aria-hidden="true">↺</span>
            Reset
          </button>
        </section>

        <section id="app" class="practice-area" aria-live="polite"></section>
      </main>
    </div>

    <span id="heartsStat" hidden>5</span>

    <template id="speakerIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
        <path d="M16 8.5a4 4 0 0 1 0 7"></path>
        <path d="M18.5 6a7 7 0 0 1 0 12"></path>
      </svg>
    </template>

    <script src="app.js"></script>
    <script src="customize.js?v=13"></script>
    <script src="vocab.js?v=2"></script>
    <script src="vocab-extras.js?v=1"></script>
    <script src="vocab-direction.js?v=1"></script>
    <script src="practice-data.js?v=1"></script>
    <script src="practice-sections.js?v=1"></script>
    <script src="practice-ui-helpers.js?v=1"></script>
    <script src="learn-data.js?v=1"></script>
    <script src="learn-v2.js?v=2"></script>
    <script src="learn-modal.js?v=1"></script>
    <script src="dashboard-exam.js?v=1"></script>
    <script src="dashboard-exam-polish.js?v=2"></script>
    <script src="exercise-exam-bank.js?v=1"></script>
    <script src="free-navigation.js?v=1"></script>
    <script src="legacy-free-navigation.js?v=1"></script>
  </body>
</html>
